name: Deploy Frontend (Expo OTA Update)

on:
  push:
    branches:
      - main
      - frontend
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  update:
    name: Publish Expo OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Determine update channel
        id: channel
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "branch=production" >> $GITHUB_OUTPUT
          else
            echo "branch=preview" >> $GITHUB_OUTPUT
          fi

      - name: Publish OTA Update
        working-directory: frontend
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: 'eas update --branch ${{ steps.channel.outputs.branch }} --message "Auto-update: $COMMIT_MSG [${{ github.sha }}]"'
